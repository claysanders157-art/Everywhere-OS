name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            gcc-multilib \
            libc6-dev-i386 \
            nasm \
            qemu-system-x86 \
            grub-pc-bin \
            xorriso \
            mtools

      - name: Build
        run: make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: os-build
          path: build/